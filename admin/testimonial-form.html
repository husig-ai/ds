<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonial form — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body">

<aside class="admin-sidebar">
  <div class="brand"><strong>Agent Admin</strong><div>{{CONFIG.brandName}}</div></div>
  <nav class="admin-nav">
    <a href="index.html">Overview</a>
    <a href="leads.html">Leads</a>
    <a href="listings.html">Listings</a>
    <a href="testimonials.html" class="active">Testimonials</a>
  </nav>
  <div class="admin-signout"><button id="signOutBtn">Sign out</button></div>
</aside>

<main class="admin-main">
  <div class="breadcrumb"><a href="index.html">Admin</a><span class="sep">/</span><a href="testimonials.html">Testimonials</a><span class="sep">/</span><span class="current" id="breadcrumbCurrent">New testimonial</span></div>
  <h1 id="formTitle">New testimonial</h1>

  <form class="admin-form" id="testimonialForm">
    <div class="field"><label class="tag">Client name *</label><input type="text" name="client_name" required></div>
    <div class="field"><label class="tag">Client location</label><input type="text" name="client_location" placeholder="e.g. Frisco, TX"></div>
    <div class="two-col">
      <div class="field">
        <label class="tag">Transaction type</label>
        <select name="transaction_type">
          <option value="buyer">Buyer</option>
          <option value="seller">Seller</option>
          <option value="both">Both</option>
        </select>
      </div>
      <div class="field">
        <label class="tag">Rating</label>
        <select name="rating">
          <option value="5">5 stars</option>
          <option value="4">4 stars</option>
          <option value="3">3 stars</option>
          <option value="2">2 stars</option>
          <option value="1">1 star</option>
        </select>
      </div>
    </div>
    <div class="field"><label class="tag">Quote *</label><textarea name="quote" required></textarea></div>
    <div class="field"><label class="tag">Photo URL</label><input type="text" name="photo_url"></div>
    <div style="display:flex; gap:24px;">
      <div class="field checkbox-row"><input type="checkbox" name="featured" id="featured"><label for="featured">Feature on homepage</label></div>
      <div class="field checkbox-row"><input type="checkbox" name="published" id="published" checked><label for="published">Published</label></div>
    </div>

    <p class="error-text" id="formError" style="display:none;"></p>

    <div style="display:flex; gap:12px;">
      <button type="submit" class="btn btn-brass" id="saveBtn">Create testimonial</button>
      <a href="testimonials.html" class="btn btn-secondary" style="background:#fff; border:1px solid var(--line); text-decoration:none; padding:11px 20px; border-radius:3px; font-weight:600; font-size:14px;">Cancel</a>
    </div>
  </form>
</main>

<script src="../js/env.js"></script>
<script src="../js/load-env.js"></script>
<script type="module">
  import '../js/config-loader.js';
  import './js/testimonial-form.js';
</script>
</body>
</html>
